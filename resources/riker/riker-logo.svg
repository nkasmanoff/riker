<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bracketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1" fill="none">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Opening bracket accent - top left -->
  <g opacity="0.15">
    <path d="M96 148 L96 364 L104 364 L104 156 L136 156 L136 148 Z" fill="#6ee7ff"/>
  </g>

  <!-- Closing bracket accent - bottom right -->
  <g opacity="0.15">
    <path d="M408 148 L408 156 L440 156 L440 364 L408 364 L408 356 L432 356 L432 164 Z" fill="#7c3aed"/>
  </g>

  <!-- Main R shape -->

  <!-- Vertical stem -->
  <rect x="196" y="120" width="40" height="272" rx="10" fill="url(#rGrad)"/>

  <!-- Top arc - loop of the R -->
  <path d="M236 120 Q340 116 340 200 Q340 270 284 290 L236 290 Z" fill="url(#rGrad)"/>

  <!-- Inner cutout of the loop -->
  <path d="M236 155 L236 255 Q290 255 290 200 Q290 155 236 155 Z" fill="url(#bg)"/>

  <!-- Diagonal leg -->
  <path d="M270 278 Q340 320 376 392 L338 392 Q304 330 248 285 Z" fill="url(#rGrad)"/>

  <!-- Slash accent through the R -->
  <g opacity="0.2">
    <path d="M276 130 L344 150 L256 385 L188 365 Z" fill="#fff"/>
  </g>

  <!-- Code dots -->
  <g opacity="0.6">
    <circle cx="192" cy="440" r="5" fill="#6ee7ff" opacity="0.5"/>
    <circle cx="220" cy="440" r="5" fill="#7c3aed" opacity="0.4"/>
    <circle cx="248" cy="440" r="5" fill="#6ee7ff" opacity="0.3"/>
    <circle cx="276" cy="440" r="5" fill="#7c3aed" opacity="0.2"/>
  </g>
</svg>
